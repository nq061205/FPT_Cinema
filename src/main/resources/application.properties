spring.application.name=FPT_Cinema

spring.datasource.url=${DB_URL:jdbc:mysql://fpt-cinema-db-hgduy03-63f3.g.aivencloud.com:27667/fpt-cinema?sslMode=REQUIRED&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# When JWT_SECRET is empty, a temporary key is generated for local development.
security.jwt.secret=${JWT_SECRET:}
security.jwt.issuer=${JWT_ISSUER:fpt-cinema-api}
security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:PT1H}

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}
