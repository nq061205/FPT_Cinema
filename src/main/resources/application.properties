spring.application.name=FPT_Cinema

# Tự nạp application-local.properties (chứa secret, đã gitignore) khi chạy local.
# Bỏ dòng này khi deploy production và dùng biến môi trường thật.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DB_URL:jdbc:mysql://fpt-cinema-db-hgduy03-63f3.g.aivencloud.com:27667/fpt-cinema?sslMode=REQUIRED&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# When JWT_SECRET is empty, a temporary key is generated for local development.
security.jwt.secret=${JWT_SECRET:}
security.jwt.issuer=${JWT_ISSUER:fpt-cinema-api}
security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:PT1H}

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}

n8n.chat.webhook-url=${N8N_CHAT_WEBHOOK_URL:}
n8n.chat.webhook-secret=${N8N_CHAT_WEBHOOK_SECRET:}
n8n.chat.secret-header=${N8N_CHAT_SECRET_HEADER:X-Webhook-Secret}

# ===================== VNPay sandbox config =====================
# Đăng ký merchant sandbox tại https://sandbox.vnpayment.vn để lấy tmn-code & hash-secret.
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
# URL người dùng được VNPay redirect về sau khi thanh toán (frontend hoặc BE endpoint).
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payment/vnpay/return}
vnpay.version=${VNPAY_VERSION:2.1.0}
vnpay.command=${VNPAY_COMMAND:pay}
vnpay.currency-code=${VNPAY_CURRENCY_CODE:VND}
vnpay.locale=${VNPAY_LOCALE:vn}
# Thời gian hết hạn link thanh toán (phút).
vnpay.payment-timeout-minutes=${VNPAY_PAYMENT_TIMEOUT_MINUTES:15}

cinema.opening-time=08:00
cinema.closing-time=23:00
cinema.default-cleaning-buffer-minutes=15

cinema.seat-price.multiplier.NORMAL=1.0
cinema.seat-price.multiplier.VIP=1.5
cinema.seat-price.multiplier.COUPLE=1.8
cinema.seat-price.multiplier.PREMIUM=2.0